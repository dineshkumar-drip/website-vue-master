name: Code Quality Test

on:
  pull_request:
    branches:
      - master

jobs:
  lint_and_build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js v16.14.2
        uses: actions/setup-node@v3
        with:
          node-version: '16.14.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint
